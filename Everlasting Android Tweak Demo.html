<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Everlasting Tweak – Try Without Installing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  :root {
    --bg:          #18120A;
    --surface:     #231D0F;
    --surf-cont:   #2D2618;
    --surf-cth:    #373020;
    --primary:     #C8A830;
    --primary-dim: rgba(200,168,48,0.18);
    --on-primary:  #1C1500;
    --on-surf:     #EDE8DC;
    --on-surf-var: #9E9880;
    --divider:     rgba(200,180,100,0.14);
    --chip-bg:     #373020;
    --radius-card: 20px;
    --radius-icon: 13px;
    --font: 'Google Sans', 'Segoe UI', sans-serif;
  }

  body {
    background: #0a0a0a;
    font-family: var(--font);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-shell {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 2px #2a2a2a,
      0 0 0 4px #1a1a1a,
      0 40px 80px rgba(0,0,0,0.85),
      0 0 100px rgba(200,168,48,0.06);
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 6px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .time { font-size: 15px; font-weight: 700; color: var(--on-surf); }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 14px; height: 14px; fill: var(--on-surf); }
  .batt-pct { font-size: 11px; font-weight: 700; color: var(--on-surf); }

  .screen { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .screen.hidden { display:none; }

  .top-bar { background: var(--surface); flex-shrink: 0; z-index: 10; }

  .top-bar-row {
    display: flex; align-items: center;
    padding: 6px 4px; min-height: 56px; gap: 2px;
  }
  .app-logo {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--primary-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: var(--primary);
    flex-shrink: 0; margin-left: 8px;
  }
  .app-title { margin-left: 10px; flex:1; }
  .app-title .name { font-size: 16px; font-weight: 700; color: var(--on-surf); }
  .app-title .sub  { font-size: 11px; color: var(--on-surf-var); }
  .top-actions { display: flex; }

  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .15s;
  }
  .icon-btn:hover  { background: rgba(255,255,255,0.07); }
  .icon-btn:active { background: rgba(255,255,255,0.12); }
  .icon-btn svg { width: 22px; height: 22px; fill: var(--on-surf); }

  .search-row {
    display: none; align-items: center;
    padding: 4px 4px; min-height: 56px; gap: 4px;
  }
  .search-row.active { display: flex; }
  .search-lead { padding: 0 8px; display:flex; align-items:center; flex-shrink:0; }
  .search-input {
    flex:1; background:transparent; border:none; outline:none;
    font-size: 16px; color: var(--on-surf); font-family: var(--font);
    caret-color: var(--primary);
  }
  .search-input::placeholder { color: var(--on-surf-var); }

  .chips-row {
    background: var(--surface);
    overflow-x: auto; overflow-y: hidden;
    display: flex; gap: 8px;
    padding: 6px 16px 10px; scrollbar-width: none;
  }
  .chips-row::-webkit-scrollbar { display:none; }
  .chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 50px;
    background: var(--chip-bg); border: 1px solid transparent;
    font-size: 12px; font-weight: 500; color: var(--on-surf);
    cursor: pointer; transition: all .15s; font-family: var(--font);
    white-space: nowrap;
  }
  .chip.active { background: #3A2E00; border-color: var(--primary); color: var(--primary); font-weight: 700; }

  .divider { height: 1px; background: var(--divider); flex-shrink: 0; }

  .content {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding: 10px 16px 40px; scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display:none; }

  .cat-header { display:flex; align-items:center; gap:8px; padding: 14px 4px 6px; }
  .cat-name { font-size: 13px; font-weight: 700; color: var(--primary); }
  .cat-count { font-size: 11px; color: var(--on-surf-var); }

  .feat-card { background: var(--surf-cont); border-radius: var(--radius-card); overflow:hidden; margin-bottom:4px; }

  .feat-row {
    display: flex; align-items: center;
    padding: 11px 16px; gap: 14px;
    cursor: pointer; transition: background .1s;
  }
  .feat-row:hover  { background: rgba(255,255,255,0.035); }
  .feat-row:active { background: rgba(255,255,255,0.07); }

  .feat-divider { height:1px; background:var(--divider); margin: 0 16px 0 74px; }

  .feat-icon {
    width: 44px; height: 44px; border-radius: var(--radius-icon);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .feat-icon svg { width: 22px; height: 22px; }

  .feat-text { flex:1; min-width:0; }
  .feat-title { font-size:15px; font-weight:500; color:var(--on-surf); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .feat-sub   { font-size:12px; color:var(--on-surf-var); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .feat-chev  { flex-shrink:0; opacity:.4; }
  .feat-chev svg { width:18px; height:18px; fill:var(--on-surf-var); }

  .empty { display:flex; flex-direction:column; align-items:center; padding:80px 0; text-align:center; }
  .empty-ico { width:68px; height:68px; border-radius:50%; background:var(--surf-cth); display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
  .empty-ico svg { width:32px; height:32px; fill:var(--on-surf-var); }
  .empty-title { font-size:16px; font-weight:600; color:var(--on-surf); margin-bottom:4px; }
  .empty-sub   { font-size:13px; color:var(--on-surf-var); }

  /* Settings */
  .s-top {
    background:var(--surface);
    display:flex; align-items:center;
    padding:6px 4px; min-height:56px; gap:4px; flex-shrink:0;
  }
  .back-btn {
    width:42px;height:42px;border-radius:50%;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
  }
  .back-btn:hover { background:rgba(255,255,255,0.07); }
  .back-btn svg { width:22px;height:22px;fill:var(--on-surf); }

  .s-content { flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px 40px;scrollbar-width:none; }
  .s-content::-webkit-scrollbar { display:none; }

  .app-info-card { background:var(--surf-cont);border-radius:var(--radius-card);padding:16px;margin-bottom:10px; }
  .ai-row { display:flex;align-items:center;gap:12px; }
  .ai-logo {
    width:52px;height:52px;border-radius:16px;
    background:linear-gradient(145deg,#2d2200,#4a3800);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .ai-name { font-size:19px;font-weight:700;color:var(--on-surf); }
  .ai-tag  { font-size:13px;color:var(--on-surf-var);margin-top:1px; }
  .ai-ver  { font-size:13px;color:var(--primary);font-weight:600;margin-top:3px; }
  .perm-block { margin-top:14px; }
  .perm-lbl { display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px; }
  .perm-lbl span:first-child { color:var(--on-surf-var); }
  .perm-lbl span:last-child  { color:#F44336; }
  .perm-track { height:5px;border-radius:3px;background:rgba(255,255,255,0.1);overflow:hidden; }
  .perm-fill  { height:100%;width:2%;border-radius:3px;background:var(--primary); }

  .update-card {
    background:var(--surf-cont);border-radius:var(--radius-card);
    padding:13px 16px;margin-bottom:10px;
    display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s;
  }
  .update-card:hover { background:var(--surf-cth); }
  .u-ico { width:40px;height:40px;border-radius:12px;background:rgba(76,175,80,0.17);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .u-ico svg { width:22px;height:22px; }
  .u-title { font-size:15px;font-weight:600;color:var(--on-surf); }
  .u-sub   { font-size:12px;color:var(--on-surf-var);margin-top:1px; }
  .u-chev  { margin-left:auto;flex-shrink:0;opacity:.4; }
  .u-chev svg { width:18px;height:18px;fill:var(--on-surf-var); }

  .s-sec { font-size:13px;font-weight:700;color:var(--primary);padding:14px 4px 8px; }
  .s-group { background:var(--surf-cont);border-radius:var(--radius-card);overflow:hidden;margin-bottom:4px; }

  .s-item { padding:11px 16px;cursor:pointer;transition:background .1s; }
  .s-item:hover { background:rgba(255,255,255,0.035); }
  .s-item-row { display:flex;align-items:center;gap:12px; }
  .s-ico { width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .s-ico svg { width:20px;height:20px; }
  .s-text { flex:1; }
  .s-title { font-size:15px;font-weight:500;color:var(--on-surf); }
  .s-sub   { font-size:12px;color:var(--on-surf-var);margin-top:1px;line-height:1.4; }
  .s-divider { height:1px;background:var(--divider);margin:0 16px 0 68px; }
  .s-chev { flex-shrink:0;opacity:.4; }
  .s-chev svg { width:18px;height:18px;fill:var(--on-surf-var); }

  .toggle {
    width:50px;height:28px;border-radius:14px;
    background:rgba(255,255,255,0.14);
    position:relative;cursor:pointer;transition:background .2s;
    flex-shrink:0;border:none;
  }
  .toggle.on { background:var(--primary); }
  .toggle::after {
    content:'';width:22px;height:22px;border-radius:50%;
    background:#fff;position:absolute;top:3px;left:3px;
    transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  .toggle.on::after { transform:translateX(22px); }

  .seg-row { display:flex;gap:6px;margin-top:10px;flex-wrap:wrap; }
  .seg-btn {
    padding:7px 14px;border-radius:10px;
    background:var(--chip-bg);border:1px solid transparent;
    font-size:13px;font-weight:500;color:var(--on-surf);
    cursor:pointer;transition:all .15s;font-family:var(--font);
  }
  .seg-btn.active { background:#3A2E00;border-color:var(--primary);color:var(--primary);font-weight:700; }

  .pill-row { display:flex;gap:8px;margin-top:10px; }
  .pill-btn {
    flex:1;padding:8px 0;border-radius:10px;text-align:center;
    background:var(--chip-bg);border:1px solid transparent;
    font-size:13px;font-weight:500;color:var(--on-surf);
    cursor:pointer;transition:all .15s;font-family:var(--font);
  }
  .pill-btn.active { background:#3A2E00;border-color:var(--primary);color:var(--primary);font-weight:700; }

  .grant-btn {
    padding:5px 13px;border-radius:20px;
    background:rgba(200,168,48,0.15);color:var(--primary);
    border:1px solid rgba(200,168,48,0.3);
    font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);flex-shrink:0;
  }

  .demo-badge {
    position:absolute;top:0;right:20px;
    background:var(--primary);color:var(--on-primary);
    font-size:9px;font-weight:700;
    padding:3px 9px;border-radius:0 0 8px 8px;
    letter-spacing:.6px;z-index:20;
  }

  .toast {
    position:absolute;bottom:22px;left:50%;
    transform:translateX(-50%) translateY(70px);
    background:#373020;color:var(--on-surf);
    border-radius:24px;padding:10px 20px;
    font-size:13px;font-weight:500;
    white-space:nowrap;z-index:50;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 4px 20px rgba(0,0,0,.5);
    pointer-events:none;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>

const S = {
  cat:"All", q:"", searching:false,
  colorful:true, solid:false,
  theme:0, dynColor:true, pillStyle:0, freezeTabs:true, uiBlur:false, bgDim:false,
};

// Clock
function tick(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes();
  document.getElementById('clock').textContent=h+':'+(m<10?'0':'')+m;
}
tick(); setInterval(tick,15000);

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function iconBox(f){
  const alpha = S.solid ? 0.85 : 0.17;
  const bg = S.colorful ? rgba(f.c, alpha) : 'var(--primary-dim)';
  const fill = S.colorful ? f.c : 'var(--primary)';
  return `<div class="feat-icon" style="background:${bg}">${svg(P[f.p]||P.sparkle, fill)}</div>`;
}

// Chips
function buildChips(){
  document.getElementById('chipsRow').innerHTML = cats.map(c=>
    `<button class="chip${S.cat===c?' active':''}" onclick="selectCat('${c.replace(/&/g,'&amp;')}')">${c}</button>`
  ).join('');
}
function selectCat(c){ S.cat=c; buildChips(); buildFeatures(); }

// Search
function toggleSearch(){
  S.searching=!S.searching;
  document.getElementById('titleRow').style.display = S.searching?'none':'flex';
  document.getElementById('searchRow').classList.toggle('active', S.searching);
  if(S.searching) document.getElementById('searchInput').focus();
  else { S.q=''; document.getElementById('searchInput').value=''; buildFeatures(); }
}
function onSearch(v){ S.q=v; buildFeatures(); }

// Features
function getFiltered(){
  return features.filter(f=>{
    const q=S.q.trim().toLowerCase();
    return (!q||(f.t+f.s+f.cat).toLowerCase().includes(q))&&(S.cat==='All'||f.cat===S.cat);
  });
}

function buildFeatures(){
  const list=getFiltered(), el=document.getElementById('featContent');
  el.innerHTML='';
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">${svg(P.searchOff,'var(--on-surf-var)',32)}</div><div class="empty-title">Nothing found</div><div class="empty-sub">Try a different term or category</div></div>`;
    return;
  }
  const grouped = S.cat==='All'&&!S.q.trim();
  if(grouped){
    const g={};
    list.forEach(f=>{ if(!g[f.cat])g[f.cat]=[]; g[f.cat].push(f); });
    Object.entries(g).forEach(([cat,items])=>{
      const h=document.createElement('div'); h.className='cat-header';
      h.innerHTML=`<span class="cat-name">${cat}</span><span class="cat-count">${items.length}</span>`;
      el.appendChild(h); el.appendChild(buildCard(items));
    });
  } else {
    if(S.q.trim()){
      const l=document.createElement('div');
      l.style.cssText='font-size:12px;color:var(--on-surf-var);padding:4px 4px 8px;';
      l.textContent=list.length+' result'+(list.length!==1?'s':'');
      el.appendChild(l);
    }
    el.appendChild(buildCard(list));
  }
}

function buildCard(items){
  const card=document.createElement('div'); card.className='feat-card';
  items.forEach((f,i)=>{
    if(i>0){ const d=document.createElement('div'); d.className='feat-divider'; card.appendChild(d); }
    const row=document.createElement('div'); row.className='feat-row';
    row.innerHTML=`${iconBox(f)}<div class="feat-text"><div class="feat-title">${f.t}</div><div class="feat-sub">${f.s}</div></div><div class="feat-chev">${svg(P.chevRight,'var(--on-surf-var)')}</div>`;
    row.onclick=()=>toast('Demo only – feature not active');
    card.appendChild(row);
  });
  return card;
}

// Settings
function openSettings(){
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('settingsScreen').classList.remove('hidden');
  buildSettings();
}
function closeSettings(){
  document.getElementById('settingsScreen').classList.add('hidden');
  document.getElementById('homeScreen').classList.remove('hidden');
  buildFeatures();
}

function buildSettings(){
  const el=document.getElementById('settingsContent'); el.innerHTML='';

  const info=document.createElement('div'); info.className='app-info-card';
  info.innerHTML=`<div class="ai-row"><div class="ai-logo">${svg(P.sparkle,'var(--primary)',28)}</div><div><div class="ai-name">Everlasting Tweak</div><div class="ai-tag">Android Enhancement Suite</div><div class="ai-ver">v6.0.0 · Made By Hari ❤️</div></div></div><div class="perm-block"><div class="perm-lbl"><span>0 / 6 permissions</span><span>0 / 6 granted</span></div><div class="perm-track"><div class="perm-fill"></div></div></div>`;
  el.appendChild(info);

  const upd=document.createElement('div'); upd.className='update-card';
  upd.innerHTML=`<div class="u-ico">${svg(P.download,'#4CAF50')}</div><div><div class="u-title">Check for Updates</div><div class="u-sub">Tap to check · Goes to releases page if update found</div></div><div class="u-chev">${svg(P.chevRight,'var(--on-surf-var)')}</div>`;
  upd.onclick=()=>toast('Checking for updates…');
  el.appendChild(upd);

  el.appendChild(sec('Appearance'));
  const ag=grp();
  ag.appendChild(si({p:'palette',c:'#9C27B0',t:'Theme Mode',extra:`<div class="seg-row">${['Auto','Light','Dark','Black','White'].map((l,i)=>`<button class="seg-btn${S.theme===i?' active':''}" onclick="sTheme(${i})">${l}</button>`).join('')}</div>`}));
  ag.appendChild(sd());
  ag.appendChild(si({p:'sparkle',c:'#2196F3',t:'Dynamic Color',s:'Wallpaper-based Material You colors',tog:S.dynColor,fn:()=>{S.dynColor=!S.dynColor;buildSettings();}}));
  ag.appendChild(sd());
  ag.appendChild(si({p:'palette',c:'#FF9800',t:'Colorful Feature Icons',s:'Show colored icon bubbles in home screen feature list',tog:S.colorful,fn:()=>{S.colorful=!S.colorful;buildSettings();}}));
  ag.appendChild(sd());
  ag.appendChild(si({p:'dropper',c:'#9C27B0',t:'Solid Icon Backgrounds',s:'Fully opaque colored bubbles. Off = translucent/subtle',tog:S.solid,fn:()=>{S.solid=!S.solid;buildSettings();}}));
  ag.appendChild(sd());
  ag.appendChild(si({p:'tune',c:'#2196F3',t:'Home Screen Pill Style',s:'How the category filter pills look on the home screen',extra:`<div class="pill-row"><button class="pill-btn${S.pillStyle===0?' active':''}" onclick="sPill(0)">Match UI</button><button class="pill-btn${S.pillStyle===1?' active':''}" onclick="sPill(1)">Blur</button></div>`}));
  ag.appendChild(sd());
  ag.appendChild(si({p:'grid',c:'#2196F3',t:'Solid App Freeze Tabs',s:'On = fully opaque tab bar in App Freeze. Off = frosted-glass',tog:S.freezeTabs,fn:()=>{S.freezeTabs=!S.freezeTabs;buildSettings();}}));
  el.appendChild(ag);

  el.appendChild(sec('Background'));
  const bg=grp();
  bg.appendChild(si({p:'wallpaper',c:'#1565C0',t:'Custom Wallpaper',s:'Set a custom background image',arrow:true,fn:()=>toast('Not available in demo')}));
  bg.appendChild(sd());
  bg.appendChild(si({p:'phoneInfo',c:'#607D8B',t:'Use Device Wallpaper',s:'Use your home screen wallpaper as background',tog:false,fn:()=>toast('Not available in demo')}));
  bg.appendChild(sd());
  bg.appendChild(si({p:'dnd',c:'#37474F',t:'Background Dim',s:'Darken the background image',tog:S.bgDim,fn:()=>{S.bgDim=!S.bgDim;buildSettings();}}));
  bg.appendChild(sd());
  bg.appendChild(si({p:'sparkle',c:'#546E7A',t:'Background Blur',s:'Apply blur to the background image',tog:false,fn:()=>toast('Not available in demo')}));
  el.appendChild(bg);

  el.appendChild(sec('UI Effects'));
  const ui=grp();
  ui.appendChild(si({p:'tune',c:'#00BCD4',t:'Blur UI Containers',s:'Frosted glass effect on cards & panels',tog:S.uiBlur,fn:()=>{S.uiBlur=!S.uiBlur;buildSettings();}}));
  el.appendChild(ui);

  el.appendChild(sec('Permissions'));
  const pg=grp();
  [{p:'camera',c:'#4CAF50',t:'Camera',s:'Required for Twist for Camera'},
   {p:'walkie',c:'#F44336',t:'Microphone',s:'Required for audio features'},
   {p:'notif',c:'#FF9800',t:'Notifications',s:'Show alerts and reminders'},
   {p:'wallpaper',c:'#9C27B0',t:'Media Access',s:'Required for wallpaper & watermark'},
   {p:'security',c:'#2196F3',t:'Accessibility',s:'Core requirement for most features'},
   {p:'display',c:'#00BCD4',t:'Overlay Permission',s:'Required for Custom Nav Bar & overlays'},
  ].forEach((pr,i)=>{
    if(i>0) pg.appendChild(sd());
    pg.appendChild(si({p:pr.p,c:pr.c,t:pr.t,s:pr.s,grant:true,fn:()=>toast('Not available in demo')}));
  });
  el.appendChild(pg);

  el.appendChild(sec('About'));
  const ab=grp();
  [{p:'call',c:'#009688',t:'Telegram Group',s:'Join our community'},
   {p:'terminal',c:'#37474F',t:'GitHub',s:'View source & releases'},
   {p:'lock',c:'#607D8B',t:'Licenses',s:'Open source licenses'},
  ].forEach((a,i)=>{
    if(i>0) ab.appendChild(sd());
    ab.appendChild(si({p:a.p,c:a.c,t:a.t,s:a.s,arrow:true,fn:()=>toast('Not available in demo')}));
  });
  el.appendChild(ab);
}

function sec(t){ const d=document.createElement('div'); d.className='s-sec'; d.textContent=t; return d; }
function grp(){ const d=document.createElement('div'); d.className='s-group'; return d; }
function sd(){ const d=document.createElement('div'); d.className='s-divider'; return d; }

function si({p,c,t,s,tog,fn,extra,arrow,grant}){
  const wrap=document.createElement('div'); wrap.className='s-item';
  const bg=rgba(c,0.17), fill=c;
  let right='';
  if(tog!==undefined&&!arrow&&!grant)
    right=`<button class="toggle${tog?' on':''}" id="tg_${t.replace(/\W/g,'_')}"></button>`;
  else if(arrow) right=`<div class="s-chev">${svg(P.chevRight,'var(--on-surf-var)')}</div>`;
  else if(grant) right=`<button class="grant-btn" onclick="event.stopPropagation();(${fn?fn.toString():'()=>{}'})()" >Grant</button>`;

  wrap.innerHTML=`<div class="s-item-row"><div class="s-ico" style="background:${bg}">${svg(P[p]||P.sparkle,fill,20)}</div><div class="s-text"><div class="s-title">${t}</div>${s?`<div class="s-sub">${s}</div>`:''}</div>${right}</div>${extra||''}`;

  if(fn&&tog!==undefined&&!arrow&&!grant){
    const btn=wrap.querySelector('button.toggle');
    if(btn) btn.onclick=e=>{e.stopPropagation();fn();};
    wrap.onclick=e=>{ if(!e.target.closest('.toggle')) fn(); };
  } else if(fn&&!grant){ wrap.onclick=fn; }
  return wrap;
}

function sTheme(i){ S.theme=i; buildSettings(); }
function sPill(i){ S.pillStyle=i; buildSettings(); }

// Toast
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2200);
}

buildChips();
buildFeatures();
</script>
</body>
</html>
