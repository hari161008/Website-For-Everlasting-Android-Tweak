<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Everlasting Tweak – Try Without Installing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  :root {
    --bg:#18120A; --surface:#231D0F; --surf-cont:#2D2618; --surf-cth:#373020;
    --primary:#C8A830; --primary-dim:rgba(200,168,48,0.18); --on-primary:#1C1500;
    --on-surf:#EDE8DC; --on-surf-var:#9E9880; --divider:rgba(200,180,100,0.14);
    --chip-bg:#373020; --chip-active-bg:#3A2E00;
    --home-bar:rgba(255,255,255,0.22); --toggle-off:rgba(255,255,255,0.14);
    --hover-overlay:rgba(255,255,255,0.05);
    --radius-card:20px; --radius-icon:13px;
    --font:'Google Sans','Segoe UI',sans-serif;
  }

  body {
    background:#0a0a0a; font-family:var(--font);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    min-height:100vh; padding:10px 16px 16px; gap:10px; overflow:hidden;
  }

  /* ── BACK LINK ── */
  .back-link {
    display:flex; align-items:center; gap:8px;
    color:var(--primary); text-decoration:none;
    font-size:14px; font-weight:600; padding:8px 18px; border-radius:50px;
    background:rgba(200,168,48,0.10); border:1px solid rgba(200,168,48,0.25);
    transition:background .15s,border-color .15s; flex-shrink:0;
  }
  .back-link:hover{background:rgba(200,168,48,0.18);border-color:rgba(200,168,48,0.5);}
  .back-link svg{width:18px;height:18px;fill:var(--primary);}

  /* ── SLIDER ── */
  .slider-panel {
    display:flex; align-items:center; gap:14px;
    background:rgba(35,29,15,0.88); backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px); border:1px solid rgba(200,168,48,0.18);
    border-radius:20px; padding:10px 18px; width:min(380px,90vw);
    box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(200,168,48,.06); flex-shrink:0;
  }
  .slider-icon-btn {
    width:32px; height:32px; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; border-radius:10px; background:rgba(200,168,48,0.10);
    border:1px solid rgba(200,168,48,0.20); cursor:pointer; transition:background .15s;
  }
  .slider-icon-btn:hover{background:rgba(200,168,48,0.20);}
  .slider-icon-btn svg{width:16px;height:16px;fill:var(--primary);}
  .slider-middle{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;}
  .slider-top-row{display:flex;align-items:center;justify-content:space-between;}
  .slider-title{font-size:11px;font-weight:600;color:var(--on-surf-var);letter-spacing:.5px;text-transform:uppercase;}
  .slider-pct{font-size:12px;font-weight:700;color:var(--primary);background:rgba(200,168,48,0.12);
    padding:2px 8px;border-radius:20px;border:1px solid rgba(200,168,48,0.20);
    font-variant-numeric:tabular-nums;min-width:42px;text-align:center;}
  .size-slider{-webkit-appearance:none;appearance:none;width:100%;height:5px;
    border-radius:3px;background:rgba(200,168,48,0.20);outline:none;cursor:pointer;}
  .size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
    border-radius:50%;background:var(--primary);
    box-shadow:0 0 0 4px rgba(200,168,48,0.18),0 2px 8px rgba(0,0,0,.4);
    cursor:pointer;transition:box-shadow .15s,transform .1s;}
  .size-slider::-webkit-slider-thumb:hover{box-shadow:0 0 0 7px rgba(200,168,48,0.22),0 2px 8px rgba(0,0,0,.4);transform:scale(1.08);}
  .size-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;}

  /* ── PHONE ── */
  .phone-wrap{position:relative;flex-shrink:0;transition:width .12s ease,height .12s ease;}
  .phone-shell{
    width:390px;height:844px;background:var(--bg);border-radius:44px;overflow:hidden;
    position:relative;box-shadow:0 0 0 2px #2a2a2a,0 0 0 4px #1a1a1a,0 40px 80px rgba(0,0,0,.85),0 0 100px rgba(200,168,48,.06);
    display:flex;flex-direction:column;
  }

  /* ── SCREENS ── */
  .screen{flex:1;overflow:hidden;display:flex;flex-direction:column;}
  .screen.hidden{display:none;}

  .screen-top-pad{height:22px;flex-shrink:0;background:var(--surface);}
  .screen-bottom-pad{height:20px;flex-shrink:0;background:var(--bg);}

  /* ── TOP BAR ── */
  .top-bar{background:var(--surface);flex-shrink:0;z-index:10;}
  .top-bar-row{display:flex;align-items:center;padding:6px 4px;min-height:56px;gap:2px;}
  .app-logo{width:32px;height:32px;border-radius:10px;background:var(--primary-dim);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:900;color:var(--primary);flex-shrink:0;margin-left:8px;}
  .app-title{margin-left:10px;flex:1;}
  .app-title .name{font-size:16px;font-weight:700;color:var(--on-surf);}
  .app-title .sub{font-size:11px;color:var(--on-surf-var);}
  .top-actions{display:flex;}
  .icon-btn{width:42px;height:42px;border-radius:50%;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
  .icon-btn:hover{background:var(--hover-overlay);}
  .icon-btn svg{width:22px;height:22px;fill:var(--on-surf);}

  /* ── SEARCH ── */
  .search-row{display:none;align-items:center;padding:4px;min-height:56px;gap:4px;background:var(--surface);}
  .search-row.active{display:flex;}
  .search-lead{padding:0 8px;display:flex;align-items:center;flex-shrink:0;}
  .search-input{flex:1;background:transparent;border:none;outline:none;
    font-size:16px;color:var(--on-surf);font-family:var(--font);caret-color:var(--primary);}
  .search-input::placeholder{color:var(--on-surf-var);}

  /* ── CHIPS ── */
  .chips-row{background:var(--surface);overflow-x:auto;overflow-y:hidden;
    display:flex;gap:8px;padding:6px 16px 10px;scrollbar-width:none;}
  .chips-row::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;padding:6px 14px;border-radius:50px;background:var(--chip-bg);
    border:1px solid transparent;font-size:12px;font-weight:500;color:var(--on-surf);
    cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap;}
  .chip.active{background:var(--chip-active-bg);border-color:var(--primary);color:var(--primary);font-weight:700;}
  .chip.blur-style{background:rgba(55,48,32,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-color:rgba(200,168,48,0.08);}
  .chip.blur-style.active{background:rgba(58,46,0,0.70);border-color:var(--primary);color:var(--primary);}

  .divider{height:1px;background:var(--divider);flex-shrink:0;}

  /* ── CONTENT ── */
  .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 16px 8px;scrollbar-width:none;background:var(--bg);}
  .content::-webkit-scrollbar{display:none;}
  .cat-header{display:flex;align-items:center;gap:8px;padding:14px 4px 6px;}
  .cat-name{font-size:13px;font-weight:700;color:var(--primary);}
  .cat-count{font-size:11px;color:var(--on-surf-var);}
  .feat-card{background:var(--surf-cont);border-radius:var(--radius-card);overflow:hidden;margin-bottom:4px;}
  .feat-row{display:flex;align-items:center;padding:11px 16px;gap:14px;cursor:pointer;transition:background .1s;}
  .feat-row:hover{background:var(--hover-overlay);}
  .feat-divider{height:1px;background:var(--divider);margin:0 16px 0 74px;}
  .feat-icon{width:44px;height:44px;border-radius:var(--radius-icon);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .feat-text{flex:1;min-width:0;}
  .feat-title{font-size:15px;font-weight:500;color:var(--on-surf);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .feat-sub{font-size:12px;color:var(--on-surf-var);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .feat-chev{flex-shrink:0;opacity:.4;}
  .feat-chev svg{width:18px;height:18px;fill:var(--on-surf-var);}
  .empty{display:flex;flex-direction:column;align-items:center;padding:80px 0;text-align:center;}
  .empty-ico{width:68px;height:68px;border-radius:50%;background:var(--surf-cth);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .empty-title{font-size:16px;font-weight:600;color:var(--on-surf);margin-bottom:4px;}
  .empty-sub{font-size:13px;color:var(--on-surf-var);}

  /* ── SETTINGS ── */
  .s-top{background:var(--surface);display:flex;align-items:center;padding:6px 4px;min-height:56px;gap:4px;flex-shrink:0;}
  .s-top-title{font-size:20px;font-weight:700;color:var(--on-surf);flex:1;padding-left:2px;}
  .back-btn{width:42px;height:42px;border-radius:50%;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
  .back-btn:hover{background:var(--hover-overlay);}
  .back-btn svg{width:22px;height:22px;fill:var(--on-surf);}
  .s-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 16px 8px;scrollbar-width:none;background:var(--bg);}
  .s-content::-webkit-scrollbar{display:none;}

  /* App info */
  .app-info-card{background:var(--surf-cont);border-radius:var(--radius-card);padding:16px;margin-bottom:10px;}
  .ai-row{display:flex;align-items:center;gap:12px;}
  .ai-logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(145deg,#2d2200,#4a3800);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ai-name{font-size:19px;font-weight:700;color:var(--on-surf);}
  .ai-tag{font-size:13px;color:var(--on-surf-var);margin-top:1px;}
  .ai-ver{font-size:13px;color:var(--primary);font-weight:600;margin-top:3px;}
  .perm-block{margin-top:14px;}
  .perm-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
  .perm-lbl span:first-child{color:var(--on-surf-var);}
  .perm-lbl span:last-child{color:#F44336;}
  .perm-track{height:5px;border-radius:3px;background:rgba(128,128,128,0.15);overflow:hidden;}
  .perm-fill{height:100%;width:2%;border-radius:3px;background:var(--primary);}
  .update-card{background:var(--surf-cont);border-radius:var(--radius-card);padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s;}
  .update-card:hover{background:var(--surf-cth);}
  .u-ico{width:40px;height:40px;border-radius:12px;background:rgba(76,175,80,0.17);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .u-title{font-size:15px;font-weight:600;color:var(--on-surf);}
  .u-sub{font-size:12px;color:var(--on-surf-var);margin-top:1px;}
  .u-chev{margin-left:auto;flex-shrink:0;opacity:.4;}
  .u-chev svg{width:18px;height:18px;fill:var(--on-surf-var);}

  /* Settings items */
  .s-sec{font-size:13px;font-weight:700;color:var(--primary);padding:14px 4px 8px;}
  .s-group{background:var(--surf-cont);border-radius:var(--radius-card);overflow:hidden;margin-bottom:4px;}
  .s-item{padding:11px 16px;cursor:pointer;transition:background .1s;}
  .s-item:hover{background:var(--hover-overlay);}
  .s-item-row{display:flex;align-items:center;gap:12px;}
  .s-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .s-text{flex:1;}
  .s-title{font-size:15px;font-weight:500;color:var(--on-surf);}
  .s-sub{font-size:12px;color:var(--on-surf-var);margin-top:1px;line-height:1.4;}
  .s-divider{height:1px;background:var(--divider);margin:0 16px 0 68px;}
  .s-chev{flex-shrink:0;opacity:.4;}
  .s-chev svg{width:18px;height:18px;fill:var(--on-surf-var);}

  /* Toggle */
  .toggle{width:50px;height:28px;border-radius:14px;background:var(--toggle-off);
    position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
  .toggle.on{background:var(--primary);}
  .toggle::after{content:'';width:22px;height:22px;border-radius:50%;background:#fff;
    position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .toggle.on::after{transform:translateX(22px);}

  /* Seg / Pill */
  .seg-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .seg-btn{padding:7px 14px;border-radius:10px;background:var(--chip-bg);border:1px solid transparent;
    font-size:13px;font-weight:500;color:var(--on-surf);cursor:pointer;transition:all .15s;font-family:var(--font);}
  .seg-btn.active{background:var(--chip-active-bg);border-color:var(--primary);color:var(--primary);font-weight:700;}
  .pill-row{display:flex;gap:8px;margin-top:10px;}
  .pill-btn{flex:1;padding:8px 0;border-radius:10px;text-align:center;background:var(--chip-bg);
    border:1px solid transparent;font-size:13px;font-weight:500;color:var(--on-surf);
    cursor:pointer;transition:all .15s;font-family:var(--font);}
  .pill-btn.active{background:var(--chip-active-bg);border-color:var(--primary);color:var(--primary);font-weight:700;}

  /* Grant / Destruct */
  .grant-btn{padding:5px 13px;border-radius:20px;background:rgba(200,168,48,0.15);color:var(--primary);
    border:1px solid rgba(200,168,48,0.30);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);flex-shrink:0;}
  .destruct-btn{padding:5px 13px;border-radius:20px;background:rgba(244,67,54,0.12);color:#F44336;
    border:1px solid rgba(244,67,54,0.25);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);flex-shrink:0;}

  /* Color picker */
  .color-pick-wrap{padding:4px 0 10px;}
  .color-pick-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .color-swatch{width:34px;height:34px;border-radius:10px;border:2px solid rgba(128,128,128,0.2);cursor:pointer;flex-shrink:0;transition:transform .12s;}
  .color-swatch:hover{transform:scale(1.08);}
  .color-input-hidden{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
  .color-label{font-size:13px;color:var(--on-surf-var);flex:1;}
  .color-hex{font-size:13px;font-weight:600;color:var(--on-surf);background:var(--chip-bg);
    border-radius:8px;padding:5px 10px;font-variant-numeric:tabular-nums;border:1px solid var(--divider);cursor:pointer;}
  .color-presets{display:flex;gap:7px;flex-wrap:wrap;}
  .color-preset{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0;}
  .color-preset:hover{transform:scale(1.18);}
  .color-preset.selected{border-color:var(--on-surf);}

  /* Home indicator */
  .home-indicator{flex-shrink:0;height:30px;background:var(--bg);display:flex;align-items:center;justify-content:center;}
  .home-bar{width:134px;height:5px;background:var(--home-bar);border-radius:3px;}

  /* Toast */
  .toast{position:absolute;bottom:50px;left:50%;transform:translateX(-50%) translateY(70px);
    background:var(--surf-cth);color:var(--on-surf);border-radius:24px;padding:10px 20px;
    font-size:13px;font-weight:500;white-space:nowrap;z-index:50;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* UI Blur */
  .ui-blur-on .feat-card,.ui-blur-on .s-group,.ui-blur-on .app-info-card,.ui-blur-on .update-card{
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(45,38,24,0.70)!important;}

  /* ── THEMES ── */
  .theme-light{
    --bg:#EEE9DE; --surface:#E6E0D3; --surf-cont:#D9D2C2; --surf-cth:#CCC4B2;
    --on-surf:#1A1400; --on-surf-var:#5A5330; --divider:rgba(90,80,30,0.12);
    --chip-bg:#CCC4B2; --chip-active-bg:rgba(160,120,0,0.15);
    --home-bar:rgba(0,0,0,0.18); --toggle-off:rgba(0,0,0,0.13);
    --hover-overlay:rgba(0,0,0,0.04);
  }
  .theme-dark{
    --bg:#18120A; --surface:#231D0F; --surf-cont:#2D2618; --surf-cth:#373020;
    --on-surf:#EDE8DC; --on-surf-var:#9E9880; --divider:rgba(200,180,100,0.14);
    --chip-bg:#373020; --chip-active-bg:#3A2E00;
    --home-bar:rgba(255,255,255,0.22); --toggle-off:rgba(255,255,255,0.14);
    --hover-overlay:rgba(255,255,255,0.05);
  }
  .theme-black{
    --bg:#000000; --surface:#0D0D0D; --surf-cont:#161616; --surf-cth:#1E1E1E;
    --on-surf:#EDEAE0; --on-surf-var:#80785A; --divider:rgba(200,180,100,0.09);
    --chip-bg:#1E1E1E; --chip-active-bg:#1C1600;
    --home-bar:rgba(255,255,255,0.16); --toggle-off:rgba(255,255,255,0.13);
    --hover-overlay:rgba(255,255,255,0.04);
  }
  .theme-white{
    --bg:#FFFFFF; --surface:#F5F2EB; --surf-cont:#EAE4D6; --surf-cth:#DDD6C6;
    --on-surf:#1A1400; --on-surf-var:#6A6040; --divider:rgba(90,80,30,0.10);
    --chip-bg:#DDD6C6; --chip-active-bg:rgba(160,120,0,0.14);
    --home-bar:rgba(0,0,0,0.16); --toggle-off:rgba(0,0,0,0.12);
    --hover-overlay:rgba(0,0,0,0.04);
  }
  /* Dynamic color (Material You teal-blue) */
  .dyn-color{--primary:#5BB8D4;--primary-dim:rgba(91,184,212,0.18);--on-primary:#002E3B;}

  /* Light/white fix: ai-logo gradient & toggle dot */
  .theme-light .ai-logo,.theme-white .ai-logo{background:linear-gradient(145deg,#d8c880,#b89e40);}
</style>
</head>

// ── THEME ENGINE ──────────────────────────────────────────────────────────────
function applyTheme(){
  const shell=document.getElementById('phoneShell');
  shell.classList.remove('theme-light','theme-dark','theme-black','theme-white','dyn-color','ui-blur-on');
  const tm=[null,'theme-light','theme-dark','theme-black','theme-white'];
  if(tm[S.theme]) shell.classList.add(tm[S.theme]);
  if(S.dynColor){
    shell.classList.add('dyn-color');
    shell.style.removeProperty('--primary');
    shell.style.removeProperty('--primary-dim');
    shell.style.removeProperty('--on-primary');
  } else {
    const h=S.customColor;
    const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    shell.style.setProperty('--primary',h);
    shell.style.setProperty('--primary-dim',`rgba(${r},${g},${b},0.18)`);
    const lum=0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255);
    shell.style.setProperty('--on-primary',lum>0.45?'#111':'#FFF');
  }
  if(S.uiBlur) shell.classList.add('ui-blur-on');
  buildChips();
}

// ── CHIPS ─────────────────────────────────────────────────────────────────────
function buildChips(){
  const bc=S.pillStyle===1?' blur-style':'';
  document.getElementById('chipsRow').innerHTML=cats.map(c=>
    `<button class="chip${S.cat===c?' active':''}${bc}" onclick="selectCat('${c.replace(/&/g,'&amp;')}')">${c}</button>`
  ).join('');
}
function selectCat(c){S.cat=c;buildChips();buildFeatures();}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function toggleSearch(){
  S.searching=!S.searching;
  document.getElementById('titleRow').style.display=S.searching?'none':'flex';
  document.getElementById('searchRow').classList.toggle('active',S.searching);
  if(S.searching) document.getElementById('searchInput').focus();
  else{S.q='';document.getElementById('searchInput').value='';buildFeatures();}
}
function onSearch(v){S.q=v;buildFeatures();}

// ── FEATURES ──────────────────────────────────────────────────────────────────
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function iconBox(f){
  const alpha=S.solid?0.85:0.17;
  const bg=S.colorful?rgba(f.c,alpha):'var(--primary-dim)';
  const fill=S.colorful?f.c:'var(--primary)';
  return `<div class="feat-icon" style="background:${bg}">${svg(P[f.p]||P.sparkle,fill)}</div>`;
}
function getFiltered(){
  return features.filter(f=>{
    const q=S.q.trim().toLowerCase();
    return(!q||(f.t+f.s+f.cat).toLowerCase().includes(q))&&(S.cat==='All'||f.cat===S.cat);
  });
}
function buildFeatures(){
  const list=getFiltered(),el=document.getElementById('featContent');
  el.innerHTML='';
  el.style.filter=S.bgDim?'brightness(0.62)':'';
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">${svg(P.searchOff,'var(--on-surf-var)',32)}</div><div class="empty-title">Nothing found</div><div class="empty-sub">Try a different term or category</div></div>`;
    return;
  }
  const grouped=S.cat==='All'&&!S.q.trim();
  if(grouped){
    const g={};
    list.forEach(f=>{if(!g[f.cat])g[f.cat]=[];g[f.cat].push(f);});
    Object.entries(g).forEach(([cat,items])=>{
      const h=document.createElement('div');h.className='cat-header';
      h.innerHTML=`<span class="cat-name">${cat}</span><span class="cat-count">${items.length}</span>`;
      el.appendChild(h);el.appendChild(buildCard(items));
    });
  }else{
    if(S.q.trim()){
      const l=document.createElement('div');
      l.style.cssText='font-size:12px;color:var(--on-surf-var);padding:4px 4px 8px;';
      l.textContent=list.length+' result'+(list.length!==1?'s':'');
      el.appendChild(l);
    }
    el.appendChild(buildCard(list));
  }
}
function buildCard(items){
  const card=document.createElement('div');card.className='feat-card';
  items.forEach((f,i)=>{
    if(i>0){const d=document.createElement('div');d.className='feat-divider';card.appendChild(d);}
    const row=document.createElement('div');row.className='feat-row';
    row.innerHTML=`${iconBox(f)}<div class="feat-text"><div class="feat-title">${f.t}</div><div class="feat-sub">${f.s}</div></div><div class="feat-chev">${svg(P.chevRight,'var(--on-surf-var)')}</div>`;
    row.onclick=()=>openFeature(f);
    card.appendChild(row);
  });
  return card;
}

function sec(t){const d=document.createElement('div');d.className='s-sec';d.textContent=t;return d;}
function grp(){const d=document.createElement('div');d.className='s-group';return d;}
function sd(){const d=document.createElement('div');d.className='s-divider';return d;}

function si({p,c,t,s,tog,fn,extra,arrow,grant,destruct}){
  const wrap=document.createElement('div');wrap.className='s-item';
  const ibg=rgba(c,0.17);
  let right='';
  if(tog!==undefined&&!arrow&&!grant&&!destruct) right=`<button class="toggle${tog?' on':''}"></button>`;
  else if(arrow)    right=`<div class="s-chev">${svg(P.chevRight,'var(--on-surf-var)')}</div>`;
  else if(grant)    right=`<button class="grant-btn">Grant</button>`;
  else if(destruct) right=`<button class="destruct-btn">Reset</button>`;

  wrap.innerHTML=`<div class="s-item-row"><div class="s-ico" style="background:${ibg}">${svg(P[p]||P.sparkle,c,20)}</div><div class="s-text"><div class="s-title">${t}</div>${s?`<div class="s-sub">${s}</div>`:''}</div>${right}</div>${extra||''}`;

  if(fn&&tog!==undefined&&!arrow&&!grant&&!destruct){
    const btn=wrap.querySelector('button.toggle');
    if(btn) btn.onclick=e=>{e.stopPropagation();fn();};
    wrap.onclick=e=>{if(!e.target.closest('.toggle'))fn();};
  } else if(fn&&(arrow||destruct)){
    wrap.onclick=fn;
    const db=wrap.querySelector('.destruct-btn');
    if(db) db.onclick=e=>{e.stopPropagation();fn();};
  } else if(fn&&grant){
    const gb=wrap.querySelector('.grant-btn');
    if(gb) gb.onclick=e=>{e.stopPropagation();fn();};
  }
  return wrap;
}

function sTheme(i){S.theme=i;applyTheme();buildSettings();}
function sPill(i){S.pillStyle=i;applyTheme();buildSettings();}

function onColorPick(hex){
  S.customColor=hex;
  const sw=document.getElementById('cSwatch');
  const hx=document.getElementById('cHex');
  if(sw) sw.style.background=hex;
  if(hx) hx.textContent=hex.toUpperCase();
  document.querySelectorAll('.color-preset').forEach(el=>el.classList.toggle('selected',el.getAttribute('onclick')&&el.getAttribute('onclick').includes(hex)));
  applyTheme();
}
function onColorPreset(hex){
  S.customColor=hex;
  const inp=document.getElementById('cInput');
  if(inp) inp.value=hex;
  onColorPick(hex);
  buildSettings();
}

// ── FEATURE SCREEN ────────────────────────────────────────────────────────────
let _prevScreen='home'; // 'home' or 'settings'
function openFeature(f,from){
  _prevScreen=from||'home';
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('settingsScreen').classList.add('hidden');
  document.getElementById('featureScreen').classList.remove('hidden');
  document.getElementById('featureTitle').textContent=f.t;
  buildFeatureScreen(f);
}
function closeFeature(){
  document.getElementById('featureScreen').classList.add('hidden');
  if(_prevScreen==='settings'){
    document.getElementById('settingsScreen').classList.remove('hidden');
  } else {
    document.getElementById('homeScreen').classList.remove('hidden');
  }
}

const FS={};// per-feature toggle states, keyed by feature title

function buildFeatureScreen(f){
  const el=document.getElementById('featureContent');
  el.innerHTML='';
  if(!FS[f.t]) FS[f.t]={enabled:false,t1:false,t2:false,t3:false,t4:false,seg0:0,seg1:0,seg2:0};
  const s=FS[f.t];

  // Hero enable row
  const heroGrp=grp();
  const alpha=S.solid?0.85:0.17;
  const bg=S.colorful?rgba(f.c,alpha):'var(--primary-dim)';
  const fill=S.colorful?f.c:'var(--primary)';
  const heroWrap=document.createElement('div');
  heroWrap.className='s-item';
  heroWrap.innerHTML=`<div class="s-item-row"><div class="s-ico" style="background:${bg}">${svg(P[f.p]||P.sparkle,fill,20)}</div><div class="s-text"><div class="s-title">${f.t}</div><div class="s-sub">${f.s}</div></div><button class="toggle${s.enabled?' on':''}"></button></div>`;
  heroWrap.querySelector('button.toggle').onclick=e=>{e.stopPropagation();s.enabled=!s.enabled;buildFeatureScreen(f);};
  heroWrap.onclick=e=>{if(!e.target.closest('.toggle')){s.enabled=!s.enabled;buildFeatureScreen(f);}};
  heroGrp.appendChild(heroWrap);
  el.appendChild(heroGrp);

  // Feature-specific settings
  const spec=getFeatureSpec(f,s);
  spec.forEach(section=>{
    el.appendChild(sec(section.title));
    const g=grp();
    section.items.forEach((item,i)=>{
      if(i>0) g.appendChild(sd());
      g.appendChild(item);
    });
    el.appendChild(g);
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildChips();buildFeatures();applyTheme();

// ── SLIDER ────────────────────────────────────────────────────────────────────
function applySize(val){
  val=Math.max(40,Math.min(110,Math.round(val)));
  const pct=val/100;
  const shell=document.getElementById('phoneShell');
  const wrap=document.getElementById('phoneWrap');
  shell.style.transform=`scale(${pct})`;
  shell.style.transformOrigin='top left';
  wrap.style.width=(390*pct)+'px';
  wrap.style.height=(844*pct)+'px';
  document.getElementById('sizeLabel').textContent=val+'%';
  const slider=document.getElementById('sizeSlider');
  const min=parseFloat(slider.min),max=parseFloat(slider.max);
  const p=((val-min)/(max-min))*100;
  slider.style.background=`linear-gradient(to right,var(--primary) 0%,var(--primary) ${p}%,rgba(200,168,48,0.18) ${p}%,rgba(200,168,48,0.18) 100%)`;
}
function adjustSize(delta){
  const s=document.getElementById('sizeSlider');
  const nv=Math.max(40,Math.min(110,parseInt(s.value)+delta));
  s.value=nv;applySize(nv);
}
function autoScale(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const reserved=54+56+32; // back-link + slider + gaps
  const avH=vh-reserved;
  const avW=vw-32;
  const scale=Math.min(avH/844,avW/390,1.0);
  const pct=Math.round(scale*100);
  const slider=document.getElementById('sizeSlider');
  slider.value=pct;applySize(pct);
}
window.addEventListener('resize',autoScale);
autoScale();
