<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everlasting Android Tweak</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#18120A;--surface:#231D0F;--surf2:#2D2618;--surf3:#373020;
  --gold:#C8A830;--gold-dim:rgba(200,168,48,.18);--gold-border:rgba(200,168,48,.22);
  --on-surf:#EDE8DC;--sub:#9E9880;--divider:rgba(200,180,100,.12);
  --chip-bg:#373020;--chip-on:#3A2E00;
  --font:'Google Sans','Segoe UI',sans-serif;--max:1280px;
}
html,body{min-height:100%;background:var(--bg);color:var(--on-surf);font-family:var(--font);}
a{color:var(--gold);text-decoration:none;}

/* ════════════════════════════════════
   OUTER WRAP
   ════════════════════════════════════ */
.wrap{max-width:var(--max);margin:0 auto;min-height:100vh;}
@media(min-width:960px){
  body{background:#111008;}
  .wrap{
    border-radius:0;
    background:var(--bg);
    box-shadow:0 0 80px rgba(0,0,0,.6);
    margin:0 auto;
    display:flex;
    flex-direction:column;
  }
}

/* ════════════════════════════════════
   TWO-COLUMN GRID
   ════════════════════════════════════ */
.page-grid{
  display:block; /* mobile: stacked */
  flex:1;
}
@media(min-width:960px){
  .page-grid{
    display:grid;
    grid-template-columns:300px 1fr;
    grid-template-rows:1fr;
    align-items:start;
    border-bottom:1px solid var(--divider);
  }
}
@media(min-width:1120px){
  .page-grid{grid-template-columns:320px 1fr;}
}

/* ════════════════════════════════════
   LEFT COLUMN
   ════════════════════════════════════ */
.left-col{
  background:var(--surface);
}
@media(min-width:960px){
  .left-col{
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    scrollbar-width:none;
    border-right:1px solid var(--divider);
    display:flex;
    flex-direction:column;
  }
  .left-col::-webkit-scrollbar{display:none;}
}

/* Banner inside left col */
.hero-banner{width:100%;overflow:hidden;background:#0d0900;line-height:0;flex-shrink:0;}
.hero-banner img{width:100%;height:auto;display:block;max-height:220px;object-fit:cover;object-position:center top;}
@media(min-width:960px){
  .hero-banner img{max-height:160px;}
}

/* Hero section */
.hero{padding:24px 20px 22px;background:var(--surface);}
@media(min-width:960px){
  .hero{padding:20px 22px 22px;flex:1;display:flex;flex-direction:column;}
}

/* Mobile hero-top: icon left, info right */
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.app-icon{
  width:72px;height:72px;border-radius:20px;flex-shrink:0;
  background:linear-gradient(145deg,#2d1f00,#5a3e00);
  border:2px solid rgba(200,168,48,.3);overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 0 1px rgba(200,168,48,.1);
  display:flex;align-items:center;justify-content:center;
}
.app-icon img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block;}

/* Desktop hero-top: icon centered, full-width card */
@media(min-width:960px){
  .hero-top{
    flex-direction:column;align-items:center;
    text-align:center;gap:12px;margin-bottom:14px;
    margin-top:-36px; /* overlap banner */
  }
  .app-icon{
    width:88px;height:88px;border-radius:24px;
    box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 3px var(--surface),0 0 0 4px rgba(200,168,48,.25);
  }
}

.hero-info{flex:1;min-width:0;}
@media(min-width:960px){.hero-info{text-align:center;}}
.hero-name{font-size:20px;font-weight:700;color:var(--on-surf);line-height:1.2;margin-bottom:3px;}
@media(min-width:960px){.hero-name{font-size:18px;}}
.hero-tagline{font-size:11.5px;color:var(--sub);margin-bottom:8px;}
.hero-badges{display:flex;flex-wrap:wrap;gap:5px;}
@media(min-width:960px){.hero-badges{justify-content:center;}}
.badge{
  padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);
  display:inline-flex;align-items:center;gap:3px;
}
.badge .material-icons{font-size:12px;line-height:1;}
.badge.green{background:rgba(76,175,80,.15);color:#81C784;border-color:rgba(76,175,80,.25);}
.badge.blue{background:rgba(33,150,243,.15);color:#64B5F6;border-color:rgba(33,150,243,.25);}

.hero-desc{font-size:13px;color:rgba(237,232,220,.75);line-height:1.65;margin-bottom:16px;}
@media(min-width:960px){.hero-desc{font-size:12.5px;}}

/* Action buttons */
.hero-actions{display:flex;flex-wrap:wrap;gap:8px;}
@media(min-width:960px){
  .hero-actions{flex-direction:column;gap:7px;}
}
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:50px;
  background:var(--gold);color:#1C1500;
  font-size:13px;font-weight:700;cursor:pointer;
  border:none;font-family:var(--font);transition:opacity .15s;text-decoration:none;
}
.btn-primary:hover{opacity:.88;}
@media(min-width:960px){
  .btn-primary{justify-content:center;width:100%;font-size:13px;}
}
.btn-primary svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;}
/* All secondary pills — same gold style, smaller */
.btn-secondary,.btn-ghost,.btn-demo,.btn-source{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:50px;
  background:var(--gold-dim);color:var(--gold);
  font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--gold-border);font-family:var(--font);
  transition:background .15s;text-decoration:none;
}
.btn-secondary:hover,.btn-ghost:hover,.btn-demo:hover,.btn-source:hover{background:rgba(200,168,48,.28);}
.btn-secondary svg,.btn-ghost svg,.btn-demo svg,.btn-source svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
@media(min-width:960px){
  .btn-secondary,.btn-ghost,.btn-demo,.btn-source{justify-content:center;width:100%;font-size:12px;}
}

/* Compact rating shown at bottom of left col on desktop */
.left-rating{display:none;}
@media(min-width:960px){
  .left-rating{
    display:flex;align-items:center;gap:12px;
    padding:16px 22px;margin-top:auto;flex-shrink:0;
    border-top:1px solid var(--divider);
    background:var(--surf2);
  }
  .lr-num{font-size:36px;font-weight:700;color:var(--on-surf);line-height:1;letter-spacing:-1px;flex-shrink:0;}
  .lr-right{display:flex;flex-direction:column;gap:3px;}
  .lr-stars{font-size:13px;color:var(--gold);letter-spacing:2px;}
  .lr-cnt{font-size:11px;color:var(--sub);}
}

/* Left col footer links (desktop only) */
.left-footer{display:none;}
@media(min-width:960px){
  .left-footer{
    display:flex;flex-wrap:wrap;gap:6px 12px;
    padding:14px 22px 18px;border-top:1px solid var(--divider);
    flex-shrink:0;
  }
  .left-footer a{font-size:11px;color:var(--sub);transition:color .15s;}
  .left-footer a:hover{color:var(--gold);}
}

/* ════════════════════════════════════
   RIGHT COLUMN
   ════════════════════════════════════ */
.right-col{background:var(--bg);}
@media(min-width:960px){
  .right-col{
    min-height:100vh;
    overflow-y:auto;
  }
}

/* Divider between left and right sections */
.divider-line{height:1px;background:var(--divider);margin:0 20px;}
@media(min-width:960px){.divider-line{margin:0 28px;}}

/* ════════════════════════════════════
   SECTION HEADERS
   ════════════════════════════════════ */
.section{padding:0 0 4px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px;}
@media(min-width:960px){.sec-head{padding:26px 28px 14px;}}
.sec-title{font-size:17px;font-weight:700;color:var(--on-surf);}
.sec-count{font-size:12px;color:var(--sub);}

/* View-all pill */
.view-all-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:50px;
  background:var(--gold-dim);color:var(--gold);
  font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--gold-border);font-family:var(--font);transition:background .15s;
}
.view-all-pill:hover{background:rgba(200,168,48,.28);}
.view-all-pill .material-icons{font-size:13px;}

/* ════════════════════════════════════
   CHIPS ROW
   ════════════════════════════════════ */
.chips-row{
  overflow-x:auto;overflow-y:hidden;
  display:flex;gap:8px;padding:0 20px 12px;scrollbar-width:none;
}
.chips-row::-webkit-scrollbar{display:none;}
@media(min-width:960px){.chips-row{padding:0 28px 14px;}}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:50px;
  background:var(--chip-bg);border:1px solid transparent;
  font-size:12px;font-weight:500;color:var(--on-surf);
  cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap;
}
.chip:hover{border-color:var(--gold-border);}
.chip.on{background:var(--chip-on);border-color:var(--gold);color:var(--gold);font-weight:700;}

/* ════════════════════════════════════
   PREVIEW CARD (Features tap card)
   ════════════════════════════════════ */
.preview-card{
  margin:0 20px 20px;border-radius:14px;border:1px solid var(--divider);
  background:var(--surf2);cursor:pointer;transition:border-color .2s;
}
.preview-card:hover{border-color:var(--gold-border);}
@media(min-width:960px){.preview-card{margin:0 28px 22px;}}
.preview-card-inner{padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.preview-card-left{flex:1;min-width:0;}
.preview-card-title{font-size:14px;font-weight:700;color:var(--on-surf);margin-bottom:3px;}
.preview-card-sub{font-size:12px;color:var(--sub);}
.preview-card-arrow{
  width:34px;height:34px;border-radius:50%;
  background:var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.preview-card-arrow .material-icons{font-size:19px;color:var(--gold);}

/* Desktop: show 3 feature teasers inline inside the card */
.feat-teaser{display:none;}
@media(min-width:960px){
  .feat-teaser{
    display:grid;grid-template-columns:1fr 1fr;
    gap:8px;padding:0 28px 22px;
  }
  .feat-teaser-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:12px;
    background:var(--surf2);border:1px solid var(--divider);
    cursor:pointer;transition:border-color .2s;
  }
  .feat-teaser-item:hover{border-color:var(--gold-border);}
  .feat-teaser-icon{
    width:32px;height:32px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .feat-teaser-icon .material-icons{font-size:16px;}
  .feat-teaser-text{flex:1;min-width:0;}
  .feat-teaser-name{font-size:12px;font-weight:600;color:var(--on-surf);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .feat-teaser-sub{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .feat-teaser-more{
    grid-column:1/-1;
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:9px;border-radius:10px;
    background:var(--gold-dim);color:var(--gold);
    border:1px dashed var(--gold-border);
    font-size:12px;font-weight:600;cursor:pointer;
    transition:background .15s;font-family:var(--font);
  }
  .feat-teaser-more:hover{background:rgba(200,168,48,.28);}
  .feat-teaser-more .material-icons{font-size:16px;}
}

/* ════════════════════════════════════
   SCREENSHOTS STRIP
   ════════════════════════════════════ */
.ss-strip{
  display:flex;gap:10px;padding:0 20px 16px;
  overflow-x:auto;scrollbar-width:none;cursor:pointer;
}
.ss-strip::-webkit-scrollbar{display:none;}
@media(min-width:960px){.ss-strip{padding:0 28px 16px;gap:12px;}}
.ss-strip img{
  height:160px;width:auto;border-radius:14px;flex-shrink:0;
  background:#111;border:1px solid rgba(255,255,255,.08);
  object-fit:contain;filter:none;mix-blend-mode:normal;
  transition:transform .15s;
}
.ss-strip img:hover{transform:scale(1.03);}
@media(min-width:960px){.ss-strip img{height:190px;}}

/* Desktop screenshots inline grid (replaces popup trigger) */
.ss-desktop-grid{display:none;}
@media(min-width:960px){
  .ss-desktop-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    padding:0 28px 22px;
  }
  .ss-desktop-grid img{
    width:100%;border-radius:12px;display:block;
    background:#111;border:1px solid rgba(255,255,255,.08);
    object-fit:contain;cursor:pointer;
    transition:transform .15s,box-shadow .15s;
  }
  .ss-desktop-grid img:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.5);}
  /* Hide mobile strip on desktop */
  .ss-strip{display:none;}
  /* Hide screenshots view-all pill on desktop — inline grid handles it */
  #ssViewAll{display:none;}
  /* Show all screenshots inline on desktop */
  .ss-desktop-grid{grid-template-columns:repeat(4,1fr);}
}

/* ════════════════════════════════════
   RATINGS & REVIEWS
   ════════════════════════════════════ */
.summary{display:flex;gap:0;align-items:stretch;padding:16px 20px 16px;}
@media(min-width:960px){.summary{padding:16px 28px 16px;}}
.avg-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-right:20px;min-width:84px;border-right:1px solid var(--divider);flex-shrink:0;}
.avg-num{font-size:48px;font-weight:700;color:var(--on-surf);line-height:1;letter-spacing:-2px;}
.avg-stars-row{font-size:13px;color:var(--gold);margin:5px 0 3px;letter-spacing:2px;}
.avg-cnt{font-size:11px;color:var(--sub);}
.bars-col{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;padding-left:20px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-lbl{font-size:11px;color:var(--sub);width:8px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:5px;border-radius:3px;background:rgba(200,168,48,.1);overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;}

/* Review items */
.review-item{padding:16px 20px 0;border-bottom:1px solid var(--divider);}
.review-item:last-child{border-bottom:none;}
@media(min-width:960px){.review-item{padding:16px 28px 0;}}
.ri-top{display:flex;align-items:center;gap:11px;margin-bottom:7px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-size:13.5px;font-weight:600;color:var(--on-surf);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.ri-meta{font-size:11px;color:var(--sub);}
.ri-stars{font-size:13px;color:var(--gold);margin-bottom:8px;letter-spacing:1px;}
.ri-text{font-size:13.5px;color:rgba(237,232,220,.82);line-height:1.6;padding-bottom:16px;}

/* Reviews layout on desktop: 2-column grid for review cards */
@media(min-width:960px){
  .review-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:0;
  }
  .review-grid .review-item{
    border-bottom:1px solid var(--divider);
    border-right:1px solid var(--divider);
  }
  .review-grid .review-item:nth-child(even){border-right:none;}
}

/* Read more button */
.read-more-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 20px 20px;padding:11px;
  border-radius:11px;border:1px dashed var(--gold-border);
  background:var(--gold-dim);color:var(--gold);
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);transition:background .15s;
}
.read-more-btn:hover{background:rgba(200,168,48,.26);}
.read-more-btn .material-icons{font-size:18px;}
@media(min-width:960px){.read-more-btn{margin:0 28px 22px;}}

/* ════════════════════════════════════
   FEATURES TEXT LIST (in popup)
   ════════════════════════════════════ */
.feat-list-wrap{padding:0 20px 8px;}
.feat-category{margin-bottom:20px;}
.feat-cat-header{
  font-size:10.5px;font-weight:700;color:var(--gold);
  text-transform:uppercase;letter-spacing:1px;
  padding:0 0 10px;display:flex;align-items:center;gap:10px;
}
.feat-cat-header::after{content:'';flex:1;height:1px;background:var(--divider);}
.feat-item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--divider);}
.feat-item:last-child{border-bottom:none;}
.feat-item-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.feat-item-icon .material-icons{font-size:17px;}
.feat-item-body{flex:1;min-width:0;}
.feat-item-title-row{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px;margin-bottom:2px;}
.feat-item-name{font-size:13.5px;font-weight:600;color:var(--on-surf);}
.feat-item-sep{font-size:12px;color:var(--surf3);user-select:none;}
.feat-item-sub{font-size:12.5px;color:var(--sub);}
.feat-item-desc{font-size:12px;color:rgba(158,152,128,.8);line-height:1.55;}

/* ════════════════════════════════════
   SKELETON
   ════════════════════════════════════ */
.skel-wrap{padding:16px 20px;border-bottom:1px solid var(--divider);}
@media(min-width:960px){.skel-wrap{padding:16px 28px;}}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;}
.skel-circle{border-radius:50%;}
.skel-line{height:10px;border-radius:5px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ════════════════════════════════════
   STATE
   ════════════════════════════════════ */
.state-box{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.state-ico{width:56px;height:56px;border-radius:50%;background:var(--surf3);display:flex;align-items:center;justify-content:center;}
.state-ico svg{width:26px;height:26px;}
.state-title{font-size:14px;font-weight:600;color:var(--on-surf);}
.state-sub{font-size:12.5px;color:var(--sub);}
.retry-btn{margin-top:6px;padding:7px 18px;border-radius:50px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font);}

/* ════════════════════════════════════
   FOOTER (mobile only; desktop uses left-footer)
   ════════════════════════════════════ */
.footer{
  padding:18px 20px 10px;border-top:1px solid var(--divider);
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
}
@media(min-width:960px){.footer{display:none;}}
.footer a{font-size:12px;color:var(--sub);transition:color .15s;}
.footer a:hover{color:var(--gold);}

/* ════════════════════════════════════
   POPUP / DRAWER SYSTEM
   ════════════════════════════════════ */
.popup-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.popup-overlay.open{opacity:1;pointer-events:all;}

.popup-drawer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:700px;max-height:92vh;
  background:var(--surface);border-radius:24px 24px 0 0;
  display:flex;flex-direction:column;z-index:1001;
  transition:transform .35s cubic-bezier(.32,1,.23,1),opacity .3s,visibility .3s;
  overflow:hidden;opacity:0;visibility:hidden;pointer-events:none;
}
.popup-drawer.open{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:all;}

/* On desktop, popups become centered modals */
@media(min-width:960px){
  .popup-drawer{
    bottom:auto;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(.96);
    width:min(860px,90vw);max-height:85vh;
    border-radius:20px;
  }
  .popup-drawer.open{transform:translate(-50%,-50%) scale(1);}
  .popup-handle{display:none;}
}

.popup-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:12px auto 0;flex-shrink:0;}
